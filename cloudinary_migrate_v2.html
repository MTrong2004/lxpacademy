<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloudinary Migrate v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}
    .box{max-width:980px;margin:auto;background:#111827;border:1px solid #334155;border-radius:14px;padding:20px}
    h1{margin:0 0 8px;font-size:24px}.muted{color:#94a3b8}.row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
    label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:5px}input{background:#020617;color:#fff;border:1px solid #475569;border-radius:9px;padding:10px;min-width:220px}
    button{border:0;border-radius:9px;padding:11px 14px;background:#0ea5e9;color:#fff;font-weight:700;cursor:pointer}button:disabled{opacity:.5;cursor:not-allowed}
    .danger{background:#ef4444}.ok{background:#22c55e}.warn{background:#f59e0b;color:#111827}
    pre{background:#020617;border:1px solid #334155;border-radius:12px;padding:14px;white-space:pre-wrap;max-height:55vh;overflow:auto;font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.pill{background:#1e293b;border:1px solid #334155;padding:10px;border-radius:10px}
  </style>
</head>
<body>
<div class="box">
  <h1>Chuyển ảnh Base64 trong Supabase sang Cloudinary</h1>
  <p class="muted">File này chỉ dùng để chuyển ảnh cũ. Chạy xong thì xóa khỏi web.</p>

  <div class="grid">
    <div><label>Supabase URL</label><input id="supaUrl" value="https://bdbkpqnhavyoalgkvqtw.supabase.co"></div>
    <div><label>Supabase anon key</label><input id="supaKey" value="sb_publishable_h-AYsKKK57i0uJpBxJeCHA_csNkgjyB"></div>
    <div><label>Cloudinary cloud name</label><input id="cloudName" value="ddc4uvm7m"></div>
    <div><label>Unsigned upload preset</label><input id="preset" value="learninghub_unsigned"></div>
    <div><label>Số dòng mỗi lượt</label><input id="batchSize" value="10" type="number" min="1" max="50"></div>
  </div>

  <div class="row">
    <button id="loginBtn">Đăng nhập Google</button>
    <button id="checkBtn" class="warn">Kiểm tra còn Base64</button>
    <button id="startBtn" class="ok">Bắt đầu chuyển ảnh</button>
    <button id="stopBtn" class="danger" disabled>Dừng</button>
  </div>

  <div class="row">
    <label><input id="dryRun" type="checkbox" style="min-width:auto"> Chỉ kiểm tra, chưa update Supabase</label>
  </div>

  <div class="grid">
    <div class="pill">Đã quét: <b id="scanned">0</b></div>
    <div class="pill">Đã chuyển: <b id="converted">0</b></div>
    <div class="pill">Bỏ qua: <b id="skipped">0</b></div>
    <div class="pill">Lỗi: <b id="failed">0</b></div>
  </div>

  <pre id="log">Sẵn sàng.
Việc cần làm trước: Cloudinary → Settings → Upload → tạo preset UNSIGNED tên learninghub_unsigned.</pre>
</div>

<script>
let client = null;
let stopped = false;
let stats = {scanned:0, converted:0, skipped:0, failed:0};
function $(id){return document.getElementById(id)}
function log(t){$('log').textContent += '\n' + t; $('log').scrollTop = $('log').scrollHeight;}
function setStats(){Object.keys(stats).forEach(k=>$(k).textContent=stats[k]);}
function makeClient(){client = supabase.createClient($('supaUrl').value.trim(), $('supaKey').value.trim()); return client;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function parseImages(v){
  if(!v) return [];
  if(typeof v === 'string'){
    const s = v.trim();
    if(!s) return [];
    if((s.startsWith('[')&&s.endsWith(']')) || (s.startsWith('{')&&s.endsWith('}'))){try{return parseImages(JSON.parse(s));}catch(e){return [s];}}
    return [s];
  }
  if(Array.isArray(v)) return v;
  if(typeof v === 'object') return [v];
  return [];
}
function getSrc(im){
  if(!im) return '';
  if(typeof im === 'string') return im.trim();
  return String(im.src || im.url || im.secure_url || im.dataUrl || im.data_url || im.data || im.base64 || im.image || '').trim();
}
function isBase64Image(s){
  s = String(s || '').trim();
  return /^data:image\//i.test(s) || /^(iVBORw0KGgo|\/9j\/|R0lGOD|UklGR)/.test(s);
}
function toDataUri(s){
  s = String(s || '').trim();
  if(/^data:image\//i.test(s)) return s;
  let mime = 'image/jpeg';
  if(s.startsWith('iVBOR')) mime='image/png';
  else if(s.startsWith('R0lGOD')) mime='image/gif';
  else if(s.startsWith('UklGR')) mime='image/webp';
  return `data:${mime};base64,${s}`;
}
async function uploadToCloudinary(src, info){
  const fd = new FormData();
  fd.append('file', toDataUri(src));
  fd.append('upload_preset', $('preset').value.trim());
  fd.append('folder', 'learninghub/questions');
  fd.append('context', `question_id=${info.id}|subject=${info.subject_code||''}|num=${info.num||''}`);
  const url = `https://api.cloudinary.com/v1_1/${$('cloudName').value.trim()}/image/upload`;
  const res = await fetch(url, {method:'POST', body:fd});
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error?.message || ('Cloudinary HTTP ' + res.status));
  return {id:data.public_id, public_id:data.public_id, src:data.secure_url, url:data.secure_url, width:data.width, height:data.height, format:data.format, source:'cloudinary'};
}
async function convertRow(row, dry){
  const imgs = parseImages(row.images);
  if(!imgs.length) return {changed:false, images:[]};
  let changed = false;
  const out = [];
  for(const im of imgs){
    const src = getSrc(im);
    if(isBase64Image(src)){
      changed = true;
      if(dry){ out.push(im); continue; }
      const uploaded = await uploadToCloudinary(src, row);
      out.push(uploaded);
      await sleep(120);
    }else{
      out.push(im);
    }
  }
  return {changed, images:out};
}
async function ensureLogin(){
  if(!client) makeClient();
  const {data:{session}} = await client.auth.getSession();
  if(!session) throw new Error('Bạn cần đăng nhập Google trước.');
  return session;
}

$('loginBtn').onclick = async () => {
  makeClient();
  await client.auth.signInWithOAuth({provider:'google', options:{redirectTo:location.href.split('#')[0]}});
};

$('checkBtn').onclick = async () => {
  try{
    makeClient(); await ensureLogin();
    log('Đang kiểm tra Base64...');
    const {count,error} = await client.from('questions')
      .select('id', {count:'exact', head:true})
      .or('images::text.ilike.%base64%,images::text.ilike.%iVBORw0KGgo%,images::text.ilike.%/9j/%,images::text.ilike.%R0lGOD%,images::text.ilike.%UklGR%');
    if(error) throw error;
    log('Số câu còn Base64 ước tính: ' + (count ?? 0));
  }catch(e){log('LỖI kiểm tra: ' + (e.message || e));}
};

$('stopBtn').onclick = () => {stopped = true; log('Đang dừng sau dòng hiện tại...');};

$('startBtn').onclick = async () => {
  stopped = false; stats={scanned:0, converted:0, skipped:0, failed:0}; setStats();
  $('startBtn').disabled = true; $('stopBtn').disabled = false;
  try{
    makeClient(); await ensureLogin();
    const dry = $('dryRun').checked;
    const batch = Math.max(1, Math.min(50, Number($('batchSize').value||10)));
    log(dry ? 'BẮT ĐẦU CHẠY THỬ, chưa update Supabase.' : 'BẮT ĐẦU CHUYỂN ẢNH THẬT.');
    let from = 0;
    while(!stopped){
      const to = from + batch - 1;
      const {data,error} = await client.from('questions').select('id,num,subject_code,images').order('id', {ascending:true}).range(from,to);
      if(error) throw error;
      if(!data || !data.length) break;
      for(const row of data){
        if(stopped) break;
        stats.scanned++; setStats();
        try{
          const result = await convertRow(row, dry);
          if(result.changed){
            if(!dry){
              const up = await client.from('questions').update({images:result.images, updated_at:new Date().toISOString()}).eq('id', row.id);
              if(up.error) throw up.error;
            }
            stats.converted++; log('OK câu ' + (row.subject_code||'') + ' #' + (row.num||row.id));
          }else{
            stats.skipped++;
          }
          setStats();
        }catch(e){
          stats.failed++; setStats(); log('LỖI câu id=' + row.id + ': ' + (e.message || e));
        }
      }
      if(data.length < batch) break;
      from += batch;
    }
    log('XONG. Đã quét: '+stats.scanned+' | Đã chuyển: '+stats.converted+' | Bỏ qua: '+stats.skipped+' | Lỗi: '+stats.failed);
    log('Sau khi xong, chạy SQL: select id from questions where images::text like ' + "'%base64%'" + ';');
  }catch(e){
    log('LỖI TỔNG: ' + (e.message || e));
  }finally{
    $('startBtn').disabled = false; $('stopBtn').disabled = true;
  }
};
</script>
</body>
</html>
